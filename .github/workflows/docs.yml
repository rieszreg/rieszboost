name: Render and deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'python/**'
      - 'r/**'
      - 'examples/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write   # required to push to gh-pages

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install rieszboost + Python doc deps
        run: |
          python -m pip install --upgrade pip
          pip install -e python/
          pip install matplotlib pandas scikit-learn

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::reticulate
            any::R6
            any::pkgload
          working-directory: r/rieszboost

      - name: Point reticulate at the project Python
        run: echo "RETICULATE_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> $GITHUB_ENV

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: docs

      - name: Publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: docs
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
